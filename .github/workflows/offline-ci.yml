name: offline-ci

on:
  push:
  pull_request:

jobs:
  offline-contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
           requirements-core.txt
           requirements-dev.txt
      - name: Install offline dependencies
        run: python -m pip install -r requirements-core.txt -r requirements-dev.txt
      - name: Compile
        run: python -m compileall .
      - name: Pytest
        run: python -m pytest -q
      - name: Packaged test runner
        run: python scripts/run_all_tests.py
      - name: Dependency audit
        run: python scripts/audit_dependencies.py
      - name: Public demo dry-run
        run: |
          python examples/public_demo/generate_source.py --output-dir "$env:RUNNER_TEMP\originplot-public-demo"
          python scripts/origin_candidate_worker.py --builder generic_line --figure-spec examples/public_demo/figure_spec.json --candidate examples/public_demo/candidate.json --output-dir "$env:RUNNER_TEMP\originplot-public-demo\plan" --dry-run
      - name: Build and validate shareable package
        run: |
          python scripts/build_shareable_package.py --skill-dir . --zip-out "$env:RUNNER_TEMP\originplot-skill-v5.8.9-p14.zip"
          python scripts/validate_shareable_package_v5.py --path "$env:RUNNER_TEMP\originplot-skill-v5.8.9-p14.zip"

# This workflow intentionally does not install Origin or claim live Origin E2E.
